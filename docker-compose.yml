services:
  postgres:
    image: postgres:16
    container_name: rdsql-postgres
    environment:
      POSTGRES_USER: training
      POSTGRES_PASSWORD: training
      POSTGRES_DB: training
    ports:
      - "5432:5432"
    volumes:
      - rdsql-postgres-data:/var/lib/postgresql/data

volumes:
  rdsql-postgres-data:
